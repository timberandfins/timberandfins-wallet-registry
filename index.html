<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#151512">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wallet Registry">
  <title>Timber&Fins — Wallet Registry</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="brand-header">
      <div class="mark" aria-hidden="true">T<span>&</span>F</div>
      <div>
        <p class="eyebrow">TIMBER&FINS</p>
        <h1>Wallet Registry</h1>
      </div>
      <button class="icon-button" id="refreshButton" aria-label="Refresh products" title="Refresh">↻</button>
    </header>

    <section class="intro">
      <p>Record every individually numbered wallet as it leaves the workshop.</p>
    </section>

    <section class="card" aria-labelledby="formTitle">
      <div class="card-heading">
        <div>
          <p class="section-label">NEW RECORD</p>
          <h2 id="formTitle">Register a wallet</h2>
        </div>
        <div class="connection" id="connectionStatus"><span></span> Connecting</div>
      </div>

      <form id="walletForm" novalidate>
        <label>
          <span>Order number</span>
          <input id="orderNumber" name="orderNumber" inputmode="numeric" autocomplete="off" placeholder="e.g. 3364" required>
        </label>

        <label>
          <span>Customer name</span>
          <input id="customerName" name="customerName" autocomplete="name" placeholder="Full name" required>
        </label>

        <label>
          <span>Wallet purchased</span>
          <select id="product" name="product" required disabled>
            <option value="">Loading wallet editions…</option>
          </select>
        </label>

        <div class="number-preview" id="numberPreview" hidden>
          <span>Next number</span>
          <strong id="nextNumber">—</strong>
        </div>

        <button class="primary-button" id="submitButton" type="submit" disabled>
          <span>Register wallet</span>
          <span aria-hidden="true">→</span>
        </button>
      </form>
    </section>

    <section class="recent" aria-labelledby="recentTitle">
      <div class="recent-heading">
        <div>
          <p class="section-label">RECENT</p>
          <h2 id="recentTitle">Latest registrations</h2>
        </div>
      </div>
      <div id="recentOrders" class="records">
        <p class="empty-state">Loading records…</p>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
